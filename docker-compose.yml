# fleet setup for interactive local test
version: '2'
services:
  rating:
    build: .
    ports:
      - "8085:80"
    volumes:
      - ./tests/config:/config
      - ./src/:/var/www/html/
    depends_on:
      - postgres
  postgres:
    image: postgres:9
    volumes:
      - ./tests/initdb.d:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_USER=rating
      - POSTGRES_PASSWORD=s3cr3t
      - POSTGRES_DB=rating
